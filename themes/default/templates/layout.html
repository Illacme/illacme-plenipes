<!DOCTYPE html>
<html lang="{{ lang_code | default('zh') }}" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | {{ site_name }}</title>
    <meta name="description" content="{{ description }}">
    <meta name="keywords" content="{{ keywords }}">
    
    <!-- 🏗️ 字体系统注入 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

    <!-- 🏗️ 主权视觉系统物理注入 -->
    <link rel="stylesheet" href="{{ root_path }}static/css/style.css?v=15.1">
    <link rel="icon" type="image/png" href="{{ root_path }}favicon.png">

    <!-- 🔍 SEO & Social Media Matrix -->
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:title" content="{{ title }} | {{ site_name }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ canonical_url }}">
    <meta name="twitter:card" content="summary_large_image">
</head>
<body class="sovereign-engine">

    <!-- 🌐 顶部全息导航 (Glassmorphism) -->
    <header class="glass-header">
        <div class="header-container">
            <div class="header-left">
                <a href="{{ root_path }}index.html" class="logo-group">
                    <span class="logo-icon">🧬</span>
                    <span class="logo-text">{{ site_name }}</span>
                </a>
                <nav class="desktop-nav">
                    <a href="{{ root_path }}blog/index.html">{{ t_nav_blog }}</a>
                    <a href="{{ root_path }}docs/index.html">{{ t_nav_docs }}</a>
                    <a href="{{ root_path }}showcase.html">{{ t_nav_showcase }}</a>
                    <a href="{{ root_path }}about.html">{{ t_nav_about }}</a>
                </nav>
                <!-- 🔍 物理搜索索引 -->
                <div class="search-hub">
                    <input type="text" id="search-input" class="search-control" placeholder="{{ t_search_placeholder }}">
                    <div id="search-results" class="search-dropdown"></div>
                </div>
            </div>
            
            <div class="header-right">
                <div class="action-hub">
                    <!-- 🌓 主题镜像开关 -->
                    <button id="theme-toggle" class="control-btn theme-btn" title="切换模式">
                        <span class="btn-icon">☀️</span>
                        <span class="btn-label">Light</span>
                    </button>
                    <!-- 🌐 全球共振矩阵 -->
                    <div class="lang-selector">
                        <select class="control-select" onchange="window.location.href=this.value">
                            <option value="" disabled>🌐 Language</option>
                            {{ language_switcher }}
                        </select>
                    </div>
                    <!-- 📱 移动端菜单开关 -->
                    <button id="mobile-menu-toggle" class="control-btn mobile-only-btn">
                        <span class="btn-icon">☰</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div id="reading-progress"></div>

    <div class="main-layout {{ layout_class }}">
        {{ sidebar_container }}

        <!-- 📝 主内容区 -->
        <main class="content-gate">
            <div class="content-wrapper">
                <article class="prose-sovereign">
                    {{ content }}
                </article>
                
                <!-- 🌲 动态目录 (Only for docs/blog) -->
                <aside class="toc-pioneer" id="dynamic-toc">
                    <div class="toc-title">{{ t_toc_title }}</div>
                    <nav class="toc-list" id="toc-container"></nav>
                </aside>
            </div>
            
            <!-- 📜 底部存证 -->
            <footer class="audit-footer">
                <div class="footer-line"></div>
                <p>&copy; 2026 {{ site_name }}. Generated by <a href="https://github.com/Illacme/illacme-plenipes" class="engine-link">Illacme-plenipes V6.2.1</a></p>
                <p class="slogan">{{ t_footer_slogan }}</p>
            </footer>
        </main>
    </div>

    <!-- 🧠 极简交互引擎物理注入 -->
    <script src="{{ root_path }}static/js/main.js"></script>
</body>
</html>
