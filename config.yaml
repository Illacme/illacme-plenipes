# ==========================================
# Illacme-plenipes (v14.2 框架双向解耦版)
# 定位: 专为海量 Markdown 打造的高并发同步与翻译中枢
# 亮点: 极致的主题生态解耦，输入端方言抹平，CAS 空间折叠
# ==========================================

# ------------------------------------------
# 1. 本地源路径 (数据层)
# ------------------------------------------
# 💡 【路径配置指南】：
# 强烈建议使用绝对路径（如 /Users/xxx/Documents/Vault）。
# 若使用相对路径（如 ../content-vault），请务必注意它是相对于你在终端执行启动命令时的“当前所在目录”。

vault_root: "./content-vault"          # [核心基座] 您本地 Obsidian/Markdown 笔记库的物理根目录路径

# 增量编译数据库路径（请勿随意删除）。
# 引擎通过这个小文件来记住哪些文章已经翻译过，从而实现“秒级增量同步”并自动清理已失效的旧文章。
metadata_db: "./plenipes_metadata.json" # [状态机账本] 记录全量文件 MD5 指纹、资产依赖与双链寻址映射的本地 JSON 数据库路径

# ------------------------------------------
# 2. 🎨 主题与路由解耦矩阵 (Theme & Routing)
# ------------------------------------------
# 💡 【一键换肤魔法】：引擎不再死绑任何特定前端框架，只负责根据你配置的主题名精准投递数据！

# 当前激活的主题目录名 (引擎会根据这个名字自动找路径)
active_theme: "starlight"               # [路由总闸] 目标前端的框架/主题物理文件夹标识（如 starlight, nextra）

# 引擎输出路径映射表 (完全不关心前端是谁，只负责往这里倒数据)
# 💡 魔法占位符：{theme} 会被引擎自动替换为上面的 active_theme
output_paths:
  markdown_dir: "./themes/{theme}/src/content/docs" # [文档吐出点] 编译脱敏后的 Markdown/MDX 正文最终落盘的前端物理目录
  assets_dir: "./themes/{theme}/public/assets"      # [静态吐出点] 经 WebP 深度压缩后的图片及物理附件落盘的前端静态资源目录

# 🚀 动态路由矩阵：将本地笔记的不同子文件夹，灵活映射到前端的不同路由槽位。
route_matrix:
  - source: "Index"      # [源目录] 本地笔记库相对 vault_root 的源文件夹名称 (映射首页)
    prefix: ""           # [目标路由] 留空即代表投递到前端根目录，但不可直接写为 "/"
  - source: "Blog"       # [源目录] 本地笔记库的相对路径 (映射你的 content-vault/Blog)
    prefix: "blog"       # [目标路由] 投递到前端的 /blog 路由下，最终 URL 将呈现为 /blog/xxx
  - source: "Docs"       # [源目录] 本地笔记库的相对路径 (映射你的 content-vault/Docs)
    prefix: "docs"       # [目标路由] 投递到前端的 /docs 路由下，最终 URL 将呈现为 /docs/xxx

# ------------------------------------------
# 🚀 [新增防线] ⌨️ 输入端编辑器方言适配器 (Input Editor Sanitization)
# ------------------------------------------
# 💡 【万剑归宗】：无论团队使用的是 Obsidian, Logseq, MkDocs 还是 Typora，
# 引擎都会在最前端将它们的特殊语法统一清洗为系统标准中间态 (AST)。
editor_settings:
  active_editor: "auto" # 当前知识库的主力编辑器方言 (可选: obsidian, logseq, mkdocs, roam, typora)，支持指定列表，也可以直接开 auto，自动全量清洗所有已知方言杂音。
    # - "obsidian"
    # - "logseq"
    # - "typora"
    
  # [声明式输入清洗器] 允许利用正则将任何未知的非标语法在进入核心管线前强制抹平
  custom_sanitizers: {}
    # 示例：将 Typora 的高亮语法 ==高亮== 转化为 HTML <mark> 标签
    # highlight_fix:
    #   pattern: '==([^=]+)=='
    #   replace: '<mark>\1</mark>'

# ------------------------------------------
# 3. 🔌 主题专属语法适配器 (Theme-Specific Adapter)
# ------------------------------------------
# 💡 【高阶换肤指南】：
# 引擎如何把 Obsidian 的特有语法 (如 Callouts 提示块) 转化为目标主题的代码？就看这里。
# ⚡️ 智能降级特性：如果你上面的 active_theme 恰好叫 starlight，引擎会自动推断，你甚至可以删掉这段配置！
# 但如果你把前端皮肤文件夹改名了（比如叫 my-cool-theme），就必须在这里告诉引擎底层用什么方言。
theme_options:
  # 当 active_theme 为 starlight 时，读取此配置块
  starlight:
    # 指定底层渲染方言 (可选: starlight, vitepress, docusaurus, hugo, hexo, default)
    syntax_engine: "starlight" # [AST 降维锁] 强制指定引擎在进行 Callout 和代码块转换时所采用的前端专属语法树标准

# 🚀 [V14.1 架构核心] 声明式 SSG 渲染引擎矩阵 (Declarative SSG Adapters)
# 彻底解除 Python 底层代码的硬编码绑定！
# 引擎通过此处的字典，将 Obsidian 极其丰富的数十种 Callout 语法，
# 实施“物理降维”，精准投递到各前端框架所支持的极其狭窄的标准 UI 组件中。
# 
# ⚠️ [高级语法防线警告]：
# 此处的 `callout_template` 将被 Python 的 `.format()` 底层引擎直接读取。
# 必须严格保留 {type}, {title}, {body}, {body_quoted} 这四个插槽。
# 如果您的目标框架原生语法中包含 `{` 或 `}`（如 Hugo 或 Hexo），
# 必须使用双大括号 `{{` 或 `}}` 进行防转义隔离，否则将触发 Python 的 KeyError 崩溃！
framework_adapters:
  # -------------------------------------------------------------
  # 1. Astro Starlight (当前默认激活的现代化极速文档框架)
  # 底层语法：Markdown Directive (::: 语法)
  # 原生支持类型：note, tip, caution, danger
  # -------------------------------------------------------------
  starlight:
    callout_template: "\n:::{type} {title}\n{body}\n:::\n\n"
    type_mapping:
      # [信息集群] 降维至 note
      info: "note"
      abstract: "note"
      summary: "note"
      tldr: "note"
      # [成功集群] 降维至 tip
      success: "tip"
      check: "tip"
      done: "tip"
      tip: "tip"
      # [警告集群] 降维至 caution
      warning: "caution"
      attention: "caution"
      question: "caution"
      # [危险集群] 降维至 danger
      danger: "danger"
      error: "danger"
      bug: "danger"
      failure: "danger"

  # -------------------------------------------------------------
  # 2. VitePress (Vue 生态最强文档框架)
  # 底层语法：Markdown Container (::: 语法)
  # 原生支持类型：info, tip, warning, danger, details
  # -------------------------------------------------------------
  vitepress:
    callout_template: "\n:::{type} {title}\n{body}\n:::\n\n"
    type_mapping:
      # [信息集群] 降维至 info
      note: "info"
      info: "info"
      abstract: "info"
      # [成功集群] 降维至 tip
      success: "tip"
      tip: "tip"
      check: "tip"
      # [警告集群] 降维至 warning
      warning: "warning"
      attention: "warning"
      # [危险集群] 降维至 danger
      danger: "danger"
      error: "danger"
      bug: "danger"
      failure: "danger"
      # [特殊交互] 降维至 details (可折叠块)
      faq: "details"
      question: "details"

  # -------------------------------------------------------------
  # 3. Docusaurus (Meta/React 生态最强文档框架)
  # 底层语法：Admonitions (::: 语法)
  # 原生支持类型：note, tip, info, warning, danger
  # -------------------------------------------------------------
  docusaurus:
    callout_template: "\n:::{type} {title}\n{body}\n:::\n\n"
    type_mapping:
      note: "note"
      abstract: "info"
      info: "info"
      success: "tip"
      tip: "tip"
      warning: "warning"
      attention: "warning"
      danger: "danger"
      error: "danger"
      bug: "danger"

  # -------------------------------------------------------------
  # 4. Nextra (Next.js 生态极简文档框架)
  # 底层语法：纯净的 JSX/React 组件 (<Callout> 标签)
  # 原生支持类型：default, info, warning, error
  # -------------------------------------------------------------
  nextra:
    # JSX 语法隔离：Nextra 直接渲染 React 组件
    callout_template: "\n<Callout type=\"{type}\">\n**{title}**\n{body}\n</Callout>\n\n"
    type_mapping:
      note: "default"
      info: "info"
      abstract: "info"
      tip: "default"
      success: "default"
      warning: "warning"
      attention: "warning"
      danger: "error"
      error: "error"
      bug: "error"

  # -------------------------------------------------------------
  # 5. Hugo (老牌极速 Go 语言 SSG，搭配 DoIt/LoveIt 主题)
  # 底层语法：Hugo Shortcodes ({{< ... >}} 语法)
  # ⚠️ 架构防线：使用 {{{{ 和 }}}} 防止 Python 模板引擎发生解析越界撕裂
  # -------------------------------------------------------------
  hugo:
    callout_template: "\n{{{{< admonition type=\"{type}\" title=\"{title}\" >}}}}\n{body}\n{{{{< /admonition >}}}}\n\n"
    type_mapping:
      note: "note"
      info: "info"
      tip: "tip"
      success: "success"
      warning: "warning"
      danger: "danger"
      bug: "bug"
      quote: "quote"

  # -------------------------------------------------------------
  # 6. Hexo (经典博客框架，搭配 Next 主题)
  # 底层语法：Nunjucks Tag Plugins ({% ... %} 语法)
  # ⚠️ 架构防线：使用 {{{{ 和 }}}} 实施防转义隔离
  # -------------------------------------------------------------
  hexo:
    callout_template: "\n{{{{% note {type} %}}}}\n**{title}**\n{body}\n{{{{% endnote %}}}}\n\n"
    type_mapping:
      note: "default"
      info: "info"
      success: "success"
      warning: "warning"
      danger: "danger"
      error: "danger"
      bug: "danger"

  # -------------------------------------------------------------
  # 7. 纯净降级模式 (Fallback / Standard Markdown)
  # 适用场景：推送到 Github/Gitee 原生仓库，或不支持 Callout 的极简主题
  # 底层语法：原生 Markdown Blockquote 引用语法
  # -------------------------------------------------------------
  default:
    # 巧妙利用 {body_quoted} 插槽，系统在底层已自动为您将每一行打上了 `>` 前缀
    callout_template: "\n> **{title}**\n> {body_quoted}\n\n"
    type_mapping:
      # 纯原生语法不需要类型映射，直接全量透传即可，此处留空

# ------------------------------------------
# 4. 系统并发与调度核心 (🔥 性能调优区)
# ------------------------------------------
system:
  # 🚀 [多核 CPU 节流阀] 
  # 决定了引擎同时处理【文件扫描】和【图片压缩】的极速。
  # 💡 建议：由于 V13.0 已将大模型 AI 算力独立隔离，此处可大胆释放电脑性能。
  # M 系列芯片或现代多核 PC 建议直接拉满至 16~32；轻量级服务器建议设为 4~8。
  max_workers: 1                   # [I/O 吞吐极值] 当前设定为 1，代表绝对安全的单线程顺序执行，适合排查 Bug。日常建议改回 16~32 以压榨硬件。
  
  # 终端日志输出级别 (可选: DEBUG, INFO, WARNING, ERROR)。日常使用建议保持 INFO。
  log_level: "INFO"                # [终端视界] INFO 级别将输出带有 ANSI 彩色编码的进度、警告及审计简报，过滤冗余底层 DEBUG 数据。

  # 🚀 [日志冗余控制] 
  # 是否显示 AI 任务的中间过程日志（如 SEO 提取中、翻译中）。
  # 设为 true: 实时掌握 AI 进度；设为 false: 保持终端极致纯净。
  verbose_ai_logs: true  # [过程态日志锁]

  # 防多开安全端口：防止不小心在两个终端同时启动引擎导致文件损坏。
  # 默认 43210。若启动时提示端口被占用，请修改为 30000~49000 之间的任意可用数字。
  singleton_port: 43210            # [OS 级防线] 向操作系统内核申请的单例互斥 Socket 端口锁，免疫 kill -9 僵尸进程。

  # 状态自动保存间隔 (秒)：后台每隔多久将进度保存到硬盘一次。
  # 默认 2.0 秒。调小防断电丢失，调大可减少机械硬盘读写噪音。
  auto_save_interval: 2.0          # [异步脏写心跳] 守护线程将内存状态机 flush 刷入物理磁盘的绝对秒数间隔。

  # 🚀 [输入防抖节流阀] 连续保存的静默等待时间 (秒)
  # 抵御 IDE 自动保存或高频 Ctrl+S 导致的 AI 翻译接口风暴。
  # 💡 建议：打字极快且连贯者设为 3.0；习惯边写边停顿思考者建议设为 5.0~8.0。
  typing_idle_threshold: 5.0       # [Watchdog 阻尼] 用户停止敲击键盘后，看门狗延迟将文件推入 AI 编译管线的静默等待时间。

  # 嵌套双链解析深度：遇到 ![[文档嵌套]] 时，最多允许往下展开几层（防止死循环）。
  max_depth: 3                     # [AST 递归护城河] 深度优先搜索 (DFS) 展开块级/标题级双链时的最大穿透层数，超越将主动熔断。

  # ==========================================
  # 🛡️ 资产审计与物理清算阀门 (Asset Audit & GC Valve)
  # ==========================================
  # 控制引擎是否在同步完成后执行逻辑-物理的双向交叉验证，以及冗余附件的物理删除。
  # 
  # 可选值：
  # true  (默认推荐): 开启严格的基线管控。
  #       - 正向审计：检查被文章引用的图片/附件是否在前端目录中真实存在，若丢失则触发警报。
  #       - 反向清算：扫描前端资产目录，将没有任何文章引用的“孤儿文件”进行不可逆的物理抹除。
  #       - 适用场景：追求前端产物绝对纯净、无冗余的完美主义架构。
  #
  # false : 强行阻断底层清理泵 (GC)。
  #       - 行为：引擎将只负责解析、翻译和写入，绝对不会扫描前端资产目录，也绝对不会删除任何文件。
  #       - 适用场景：
  #         1. 搭配了图床或 CDN，本地资产由第三方工具（如 PicGo）手动接管时，防止被引擎误删。
  #         2. 库内包含上万篇超大规模文档时，关闭此项可免除全盘 I/O 扫描，换取极致的同步吞吐率。
  enable_asset_audit: true         # [自净基线总闸] 开启后，引擎将在全量扫描尾端自底向上肃清幽灵空目录及野路由。
  
# ==========================================
# 📄 文档元数据策略 (Frontmatter Directives)
# ==========================================
# 引擎在解析 Markdown 时，会读取头部 YAML 区的特殊指令。
# 以下是引擎原生支持的高阶控制标签（在具体的 .md 文件中使用）：
#
# - draft: true         # [拦截墙] 强制拦截该文章，全语种下线，前端物理删除。
# - publish: false      # [拦截墙] 同 draft: true，语义等价。
# - ai_sync: false      # [算力锁] 静默微调模式。跳过 AI 翻译与 SEO，仅同步本地排版，用于极速修正错别字。

# ------------------------------------------
# 5. 全局属性兜底 (Frontmatter Defaults)
# ------------------------------------------
frontmatter_defaults:
  # 这里可以配置所有文章默认拥有的基础属性。
  # 对于忘记写 YAML 属性头的笔记，引擎会自动把这里的信息补充进去。
  # 若不想强制补充作者信息，可直接设为空字符串 ""。
  author: "Eason"                  # [默认作者注入] 如果单篇源文件的 YAML 缺失 author 字段，引擎将强制混入此默认名称。
  # 注意：不要把 ai_sync: false 写在这里，否则所有文章默认都不会触发翻译！

# ------------------------------------------
# 6. 文章属性排序规则 (SEO 排版美化)
# ------------------------------------------
# 决定了最终生成的 Markdown 文件头部 YAML 的字段排列顺序，让代码极其强迫症友好。
frontmatter_order:
  - title                          # [YAML 序列 1] 强制提升为第一行：文章大标题
  - description                    # [YAML 序列 2] 强制提升为第二行：AI 提取的 SEO 精炼摘要
  - keywords                       # [YAML 序列 3] 强制提升为第三行：AI 提取的 SEO 核心流量词
  - author                         # [YAML 序列 4] 作者署名
  - date                           # [YAML 序列 5] 文章创建或发布时间
  - tags                           # [YAML 序列 6] 本地用户自定义的标签数组
  - categories                     # [YAML 序列 7] 本地用户自定义的分类数组

# ------------------------------------------
# 7. 发布控制与隐私隔离
# ------------------------------------------
publish_control:
  exclude_patterns: 
    # 黑名单机制：在这里配置的文件或文件夹，引擎会彻底无视它们。
    # 既保护隐私，又防止把草稿发给 AI 浪费 API 费用 (支持通配符 *)。
    - "_drafts/*"                  # [隐私黑名单] 使用通配符彻底屏蔽根目录下的 _drafts 文件夹及其子文件
    - "Private-*.md"               # [隐私黑名单] 物理拦截所有以 Private- 命名开头的文件，禁止将其发往外部大模型 API
    - "草稿-*"                     # [隐私黑名单] 拦截一切以"草稿-"开头的文件及文件夹
  # 配置 Webhook 全域广播雷达
  webhook_enabled: true
  webhook_urls:
    # 这里填入你的飞书/钉钉/企业微信/Telegram机器人 Webhook 地址
    # 飞书格式：https://open.feishu.cn/open-apis/bot/v2/hook/xxxx-xxxx-xxxx
    # 钉钉格式：https://oapi.dingtalk.com/robot/send?access_token=xxxx
    # 企业微信格式：https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxxxx
    # Telegram格式：https://api.telegram.org/bot[YOUR_BOT_TOKEN]/sendMessage?chat_id=[YOUR_CHAT_ID]
    - "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=1418d3e6-f834-40b6-be65-b07cd99e9aed"

  # 开源版权尾缀声明
  # 设为 true: 会在每篇编译好的文章末尾自动加上下面这句版权词 (能有效增加网站 SEO 外链)。
  # 设为 false: 保持纯净输出。
  append_credit: false             # [版权阀门] 控制是否在每篇文章的正文物理底部强制追加签名
  credit_text: "\n\n---\n*Powered by [Illacme-plenipes](https://github.com/Illacme/illacme-plenipes)*" # [签名模板] 具体的追加内容格式，支持 Markdown 语法
  
# ------------------------------------------
# 8. 图片压缩管线 (带宽拯救者)
# ------------------------------------------
image_settings:
  # 图像处理总开关。
  # 设为 true: 启动 WebP 深度压缩，自动修复手机照片的翻转问题，极大降低网站加载耗时。
  # 设为 false: 原封不动地直接拷贝图片（适用于极客追求纳秒级同步，且不在乎图床容量的场景）。
  enabled: true                    # [管线总闸] 控制是否激活 Python Pillow(PIL) 核心层对图片进行二进制重构
  
  # 推荐保持 webp 格式，它是现代浏览器的性能标配。
  format: "webp"                   # [降维格式] 强制输出的现代 Web 图片格式，极大地缩小体积而不损画质
  
  # 限制最大宽度。遇到手机直出的 4K 巨图会自动等比缩小，防止撑爆网站带宽。
  max_width: 1400                  # [分辨率天花板] 超出此像素宽度的巨图将触发 LANCZOS 算法进行等比例无损降采样
  
  # 压缩质量 (0-100)。80 是画质肉眼无损与体积缩小的完美平衡点。
  quality: 80                      # [量化精度] WebP 编码器的压缩质量级，80 属于视觉无损的黄金阈值
  
  # 静态资源部署地址前缀。
  # 必须与你的 Astro base 路径保持严格一致！
  # 如果你的网站部署在域名子路径 (如 https://domain.com/blog/)，需严格修改为 "/blog/assets/"。
  base_url: "/assets/"             # [相对路径挂载点] 最终插入到 Markdown `![img](...)` 语法中的绝对根前缀

  # 🚀 [V14.1 资产物理去重防线] Content-Addressable Storage (CAS)
  # 设为 true: 引擎会读取文件的真实二进制内容计算指纹。若多篇文章引用了不同路径但内容完全相同的图片，前端只会保留一份物理文件，实现极致的“空间折叠”。
  # 设为 false: 采用基于文件绝对路径的极速哈希（耗时接近 0），适用于对硬盘空间不敏感、追求极限编译速度的场景。
  deduplication: true              # [空间折叠阀门] 激活底层 4MB/chunk 流式二进制读取，彻底消灭全站图片冗余

# ------------------------------------------
# 9. AI 大模型驱动中枢 (AI Provider Routing)
# ------------------------------------------
translation:
  # 🎯 战术指挥官 (Strategy)
  # 可选战术: 
  #   - "single" (单节点)
  #   - "fallback" (高可用备援：主节点挂了切备用节点)
  #   - "smart_routing" (智能分流：短文本给本地，长文本给云端大模型)
  strategy: "fallback"
  
  # 🎯 战术参数 (Strategy Arguments)
  # 告诉指挥官，主力和替补分别是谁（名字必须与下方 providers 中的 key 一致）
  primary_node: "lmstudio_local"
  fallback_node: "deepseek_api"
  routing_threshold: 1000 # 如果选了 smart_routing 策略，超过多少字算长文本
  
  # 🎯 弹药库 (Providers: 登记你所有的算力接口)
  providers:
    # 1. 本地极客流
    local_ollama:
      type: "ollama"
      url: "http://localhost:11434/api/generate"
      model: "qwen2.5:7b"
      
    # 2. 国产之光 / OpenAI 兼容协议 (DeepSeek, Kimi, 通义千问, 各种聚合 API)
    # 兼容 openai 格式的任何 API (支持 OpenAI, Gemini，Qwen, DeepSeek, Ollama, LM Studio 等)。。
    # 物理限制：Google 免费版 5 次/分钟
    # 常见 base_url 配置：
    # - LM Studio: "http://localhost:1234/v1"
    # - Ollama: "http://localhost:11434/v1"
    # - 商业云端 (如 DeepSeek): "https://api.deepseek.com/v1"
    # - Google AI Studio：https://generativelanguage.googleapis.com/v1beta/openai
    # - Deepseek：https://api.deepseek.com/v1
    deepseek_api:
      type: "openai-compatible"
      base_url: "https://api.deepseek.com/v1"
      # ⚠️ 致命警告：如果你要将本配置文件推送到 Github 公开仓库，严禁填入真实的扣费 Key！
      # 云原生密钥隔离，引擎会优先读取操作系统级的安全环境变量“ILLACME_API_KEY”，避免明文配置裸奔。
      # 若系统环境变量为空，则降级读取本文件中的 api_key 值。
      api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"
      # 指定触发推理的模型名称
      # 本地：qwen3-coder-30b-a3b-instruct
      # 云端：gemini-3-flash-preview
      model: "deepseek-chat"
      
    # 3. Google 原生协议
    gemini_pro:
      type: "gemini"
      api_key: "AIza-xxxxxxxxxxxxxxxxxxxxxxxx"
      model: "gemini-3.1-pro"

    # 4. Anthropic 原生协议
    claude_sonnet:
      type: "anthropic"
      api_key: "sk-ant-xxxxxxxxxxxxxxxxxxxx"
      model: "claude-3-5-sonnet-20240620"
    
    # 5. LM Studio (本地伪装 OpenAI 协议)
    lmstudio_local:
      type: "openai-compatible"
      # LM Studio 的默认本地服务器端口是 1234，必须带上 /v1 后缀
      base_url: "http://localhost:1234/v1"
      # LM Studio 本地推理不需要鉴权，但为了防止 requests 库发空 Header 报错，随便填一个占位符即可
      api_key: "sk-lm-shfiJhOl:Qk5tuQ0hfLIGaUvSYCUP"
      # 这里填入你目前在 LM Studio 顶栏实际加载（Load）的模型名称，例如:
      model: "qwen3-coder-30b-a3b-instruct"

    # 6. OpenRouter (聚合全球模型，支持免费模型)
    openrouter_api:
      type: "openai-compatible"
      # 👇 填入 OpenRouter 的官方端点
      base_url: "https://openrouter.ai/api/v1" 
      api_key: "sk-or-v1-你的OpenRouter密钥"
      # 👇 OpenRouter 的模型名称通常带有供应商前缀
      model: "anthropic/claude-3.5-sonnet" # 或者 "google/gemini-pro-1.5", "meta-llama/llama-3-70b-instruct" 等

  # 🚀 [显存保护锁] AI 专属并发控制 (LLM Concurrency Semaphore)
  # 严格控制同一时刻对大模型发起的请求数量。
  # 💡 建议：若使用本地大模型或云端免费大模型，强烈建议锁定为 1，防止触发 429 限流或 500 报错；若使用云端商业 API，可调高至 5~10。
  llm_concurrency: 1               # [全局推理信号量] 彻底剥离 CPU 并发与 GPU VRAM 的调度，保护 AI 集群免遭 HTTP 风暴击穿
  
  # URL 生成模式: "ai" (由大模型翻译出漂亮的纯英文永久链接) 或 "local" (纯本地拼音/URL 编码)
  slug_mode: "ai"                  # [URL 降维策略] 决定文章 Permalink 路径是调用 AI 提取语义，还是走系统自带的正则兜底
  
  # API 请求超时阈值 (秒)。
  # 💡 警告：本地模型处理长文翻译极慢，建议拉高至 600 以上以防管线被强制切断。
  api_timeout: 600                 # [连接熔断点] Session 连接池在切断 Socket 之前的最大阻塞等待秒数
  
  # 遇 429(限流) 或 500(服务端崩溃) 等错误时的自动重试次数。指数退避规则：1s -> 2s -> 4s -> 8s -> 16s -> 32s
  max_retries: 3                   # [高可用补偿] 遭遇网络层抖动时，底层 Exponential Backoff（指数退避）重试引擎的最大循环次数
  
  # 防空载保护（字数阈值）。
  # 当笔记正文少于此字数时，直接判定为“空文件”，主动不发给大模型，防范 AI 胡言乱语。
  empty_content_threshold: 15      # [实质性探针] 对极端简短的占位符文件执行物理下线，免除 API 算力浪费及幻觉输出
  
  # AI 推理温度 (0.0 ~ 2.0)
  # 翻译任务必须严谨，推荐 0.1；若你想让 AI 自由发挥、二次创作，可调高至 0.6 ~ 0.8。
  temperature: 0.1                 # [大模型熵值] 锁定在 0.1 可保证机器翻译级的高度确定性，抹除模型即兴发挥产生的不可控废话
  
  # 🚀 [安全切片引擎] 长文 Token 拆分阈值
  # 当单篇文章超长时，引擎会自动将其拆成多块发给 AI，防止超出模型上下文导致报错。
  # 1 Token 约等于 1.5 个汉字。
  # 💡 建议：本地小模型或 Mac 显存有限时，建议设为 2000~2500 防爆显存；使用顶级 API 时可拉高至 8000。
  max_chunk_size: 2500             # [高精度切割刀] 基于 tiktoken 算法对文档段落进行无损切割的最大 Context 阈值
  
  # 🚀 自定义 AI 人设中枢 (Prompt 定制)
  custom_prompts:
    # [翻译基线指令] 发往 AI 翻译接口的系统级 System Message，定义语气及专业边界，默认设定为严谨的"专业技术译者"。
    # 若你的笔记偏生活随笔，可改为："你是一个幽默的博客翻译官，请用轻松的语气翻译。"
    # 大模型安全防御里的一个高级技巧，制造“跨语种隔离隔离墙” (Linguistic Boundary)，所以强烈建议用英文下达最高系统指令，用中文提供正文。
    # 人设示例："你是一位精通中美互联网文化的资深双语技术专家。请将用户提供的源文本翻译为极具地道英语母语者阅读习惯的文章。要求：1. 译文必须极其流畅自然，严禁生硬的机器翻译腔调；2. 完美保留所有 Markdown 排版格式；3. 精准转换技术专有名词。"
    # 人设示例："You are a professional technical translator. Your translation should be fluent, accurate, and perfectly retain the technical terminology. You MUST output ONLY the translated text. DO NOT add any notes, explanations, or conversational filler."
    translate_system: "You are a professional technical translator. Your translation should be fluent, accurate, and perfectly retain the technical terminology. You MUST output ONLY the translated text. DO NOT add any notes, explanations, or conversational filler."
    
    # SEO 提取指令。决定了生成的摘要和关键词的转化率导向。
    # [爬虫基线指令] 严格规范 AI 仅输出标准 JSON 数据，建立物理级别的格式校验墙。
    # 人设示例："你是一位拥有 10 年经验的顶级 SEO 流量优化专家。你需要精准洞察文章的核心价值，并提取出最容易被 Google 搜索引擎抓取的优质摘要与核心流量词汇。严格遵守 JSON 格式输出。"
    # 人设示例："You are a senior SEO expert. Extract precise descriptions and highly targeted keywords to maximize search engine visibility."
    # 人设示例："You are a senior SEO expert. You MUST output ONLY a valid, raw JSON object. NO markdown formatting, NO backticks (```), NO conversational filler, NO extra text before or after the JSON. STRICT format: {\"description\": \"...\", \"keywords\": \"...\"}"
    seo_system: "You are a senior SEO expert. You MUST output ONLY a valid, raw JSON object. NO markdown formatting, NO backticks (```), NO conversational filler, NO extra text before or after the JSON. STRICT format: {\"description\": \"...\", \"keywords\": \"...\"}"

# ------------------------------------------
# 10. AI 自动化 SEO 提取管线
# ------------------------------------------
seo_settings:
  # SEO 核心总闸。
  # 设为 true: 引擎会针对每篇新文章，让 AI 自动阅读前 1500 字，精准提取摘要和关键词。
  # 💡 建议：私人内部知识库建议设为 false 以追求极致速度；对外公开的博客务必设为 true 以白嫖搜索引擎流量。
  enabled: true                    # [算力调度闸门] 控制是否在翻译之前，开启独立子线程让大模型阅读正文并生成摘要词云
  
  # 以下开关在 enabled: true 时生效
  generate_description: true       # [YAML 注入锁] 设为 true 后，引擎会将提炼的百字精炼描述写入到最终 Markdown 的 description 字段
  generate_keywords: true          # [YAML 注入锁] 设为 true 后，引擎会将高权重分词矩阵化并注入到 keywords 字段中

# ------------------------------------------
# 11. 多语言矩阵 (多线程并发翻译阵列)
# ------------------------------------------
i18n_settings:
  # 多语言管线总开关。
  enabled: true                    # [全球化矩阵总闸] 决定是否启用底层的 TranslatorFactory 路由投递系统
  
  source:
    # 设为空字符串 "" 后，可使得所有源文章直接落地到根目录 (即 src/content/docs/)。
    # 完美对齐 Astro Starlight 框架中 'root' 语言基座的物理规范。
    code: ""                       # [源站基石] 作为不翻译的原版文章，其目标部署物理子文件夹的路径名 (空字符串代表根目录)
    translate_body: false          # [算力免疫] 针对源语言，强行阻断翻译接口的调用，仅执行 Markdown 的 AST 和排版降维
  targets:
    - code: "en"                   # [矩阵切片标识] 目标部署外语文件夹路径名 (文章将落地在 .../en/ 下)
      prompt_lang: "English"       # [大模型语义对齐] 向大模型明确下发的自然语言标识词，避免中英文夹杂时产生幻觉
      translate_body: true         # [管线激活锁] 激活针对当前 `code` 的多线程切片全文翻译任务调度

# ------------------------------------------
# 12. 全局网络与探针控制 (Network & Auditing)
# ------------------------------------------
network_settings:
  # 外链健康度雷达：免检域名白名单
  # 这些域名通常是动态生成内容的 API、带有严格反爬机制的 CDN，或需要鉴权的私有图床。
  # 它们通常会拒绝机器人的 HEAD 请求。将其加入白名单可避免产生 403 假阳性死链报错。
  # 预置了全网主流的动态徽章、数据统计探针和高防 CDN 域名。
  ignored_domains:
    # --- 徽章与动态标识卡 ---
    - "img.shields.io"
    - "badgen.net"
    - "badge.fury.io"
    - "skillicons.dev"
    # --- GitHub 状态与统计 ---
    - "github-readme-stats.vercel.app"
    - "github-readme-streak-stats.herokuapp.com"
    - "komarev.com"
    - "wakatime.com"
    # --- 访问量计数器 ---
    - "visitor-badge.laobi.icu"
    - "visitor-badge.glitch.me"
    - "api.visitorbadge.io"
    - "hits.seeyoufarm.com"
    - "count.getloli.com"
    # --- 可扩展私有网关 ---
    # - "private-oss.your-company.com"

# ------------------------------------------
# 13. 全域内容分发矩阵 (Payload Syndication)
# ------------------------------------------
# 公网地址，以便文章内链资源拼接完整地址进行分发
site_url: "https://your-astro-blog-domain.com" 

syndication:
  # [推流总闸]
  enabled: false
  timeout: 15.0
  platforms:
    # --------------------------------------
    # 1. Dev.to (Forem)
    # 获取方式: dev.to -> Settings -> Extensions -> Generate API Key
    # --------------------------------------
    devto:
      enabled: false # 👈 随时可以关闭单路分发
      api_key: ""  
      
    # --------------------------------------
    # 2. Medium
    # 获取方式: 
    #   Token: Medium Settings -> Security and apps -> Integration tokens
    #   Author ID: 比较麻烦，需要带着 Token 请求一次 https://api.medium.com/v1/me 获取 'id' 字段
    # --------------------------------------
    medium:
      enabled: false # 👈 随时可以关闭单路分发
      token: ""
      author_id: ""
      
    # --------------------------------------
    # 3. Hashnode
    # 获取方式:
    #   Token: Hashnode Settings -> Developer -> Personal Access Token
    #   Publication ID: Hashnode Blog Dashboard 网址栏中的那个长串 UUID
    # --------------------------------------
    hashnode:
      enabled: false # 👈 随时可以关闭单路分发
      token: ""
      publication_id: ""
      
    # --------------------------------------
    # 4. WordPress
    # 前提: 你的 WP 必须升级到 5.6+
    # 获取方式: WP 后台 -> Users -> Profile -> 最下方 Application Passwords 生成密码
    # --------------------------------------
    wordpress:
      enabled: false # 👈 随时可以关闭单路分发
      url: "https://your-wp-domain.com"
      username: "admin"
      app_password: ""
    
    # --------------------------------------
    # 5. Ghost CMS
    # 获取方式: Ghost 后台 -> Settings -> Integrations -> Add custom integration
    # 获取 Admin API Key 和 API URL
    # --------------------------------------
    ghost:
      enabled: false  # 改为 true 即可激活
      url: "https://your-ghost-blog.com"
      admin_api_key: "YOUR_GHOST_ADMIN_API_KEY"

    # --------------------------------------
    # 6. LinkedIn (领英)
    # 策略: 发布一条带有文章链接和摘要的动态，将领英的公域流量引流至你的独立站。
    # 获取方式: 
    #   1. 去 LinkedIn Developer Portal 创建一个 App
    #   2. 申请 "Share on LinkedIn" 权限
    #   3. 获取 Access Token
    #   4. 你的 person_urn 通常是获取 Token 时返回的，或者调用 /v2/me 接口获取
    # --------------------------------------
    linkedin:
      enabled: false  # 改为 true 即可激活
      access_token: "YOUR_LINKEDIN_ACCESS_TOKEN"
      person_urn: "YOUR_URN_ID"  # 例如: 123456789 (无需前缀)
    
    # 🚀 万向推流阀配置
    universal_webhook:
      enabled: true
      url: "http://127.0.0.1:5678/webhook/illacme-receiver" # 替换为你的真实 n8n/Webhook 接收地址
      auth_token: "" # 可选的鉴权 Token

# ==========================================
# 🛠️ 系统高阶调优 (System Tuning & Limits)
# 专为极端压测与复杂知识库准备的深水区参数
# ==========================================
system_tuning:
  # 并发控制：向外网发送 Webhook 或分发文章时的最大同时请求数 (默认 5)
  max_concurrent_workers: 5
  # AST 保护：Markdown 双链嵌套 (![[ ]]) 的最大解析深度，防止内存爆破死循环
  max_transclusion_depth: 3
  # 账本保护：本地状态机自动备份的环形快照数量
  metadata_backup_slots: 5
  
  # AI 算力护盾参数
  ai_translation:
    # 温度参数 (0.0 ~ 1.0)。严谨建议: 翻译任务保持在 0.2，防止大模型发散和破坏 Markdown 格式
    temperature: 0.2
    # 最大输出 Token 数。对于超长文支持，建议拉高至 8192 (需模型原生支持)
    max_tokens: 8192