# ==========================================
# Illacme-plenipes (v13.0 旗舰版)
# 定位: 专为海量 Markdown 打造的高并发同步与翻译中枢
# 兼容: Astro(Starlight), VitePress, Hugo, Docusaurus, Hexo
# ==========================================

# ------------------------------------------
# 1. 本地源与前端目标路径 (核心映射)
# ------------------------------------------
# 💡 【路径配置指南】：
# 强烈建议使用绝对路径（如 /Users/xxx/Documents/Vault）。
# 若使用相对路径（如 ../content-vault），请务必注意它是相对于你在终端执行启动命令时的“当前所在目录”。

# 本地笔记库的根目录（引擎将从此目录下扫描 Markdown 文件）
vault_root: "../content-vault" 

# 前端静态博客的项目根目录（引擎会将编译好的文章和图片精准投递到这里）
frontend_dir: "../omni-site"            

# 增量编译数据库路径（请勿随意删除）。
# 引擎通过这个小文件来记住哪些文章已经翻译过，从而实现“秒级增量同步”并自动清理已失效的旧文章。
metadata_db: "./plenipes_metadata.json"            

# 🚀 动态路由矩阵：将本地笔记的不同子文件夹，灵活映射到前端的不同路由槽位。
route_matrix:
  - source: "Blog"       # 本地笔记的相对路径 (映射你的 content-vault/Blog)
    prefix: "blog"       # 投递到前端的 /blog 路由下
  - source: "Docs"       # 只要在源目录里新建了分类文件夹，在这里加一行配置即可全自动化流转
    prefix: "docs"       # 投递到前端的 /docs 路由下

# ------------------------------------------
# 2. 前端框架适配器 (Framework Adapter)
# ------------------------------------------
framework:
  # 目标框架类型 (可选: starlight, vitepress, docusaurus, hugo, hexo, default)
  # 引擎会自动将 Obsidian 的特色语法 (如 > [!info] 提示块) 完美转换为目标框架专属的组件样式。
  engine: "starlight"  
  
  # 物理路径分发: 指定 Markdown 和图片在 frontend_dir (前端工程) 下的具体存放位置。
  content_dir: "src/content/docs"
  asset_dir: "public/assets"

# ------------------------------------------
# 3. 系统并发与调度核心 (🔥 性能调优区)
# ------------------------------------------
system:
  # 🚀 [多核 CPU 节流阀] 
  # 决定了引擎同时处理【文件扫描】和【图片压缩】的极速。
  # 💡 建议：由于 V13.0 已将大模型 AI 算力独立隔离，此处可大胆释放电脑性能。
  # M 系列芯片或现代多核 PC 建议直接拉满至 16~32；轻量级服务器建议设为 4~8。
  max_workers: 16
  
  # 终端日志输出级别 (可选: DEBUG, INFO, WARNING, ERROR)。日常使用建议保持 INFO。
  log_level: "INFO"    

  # 防多开安全端口：防止不小心在两个终端同时启动引擎导致文件损坏。
  # 默认 43210。若启动时提示端口被占用，请修改为 30000~49000 之间的任意可用数字。
  singleton_port: 43210

  # 状态自动保存间隔 (秒)：后台每隔多久将进度保存到硬盘一次。
  # 默认 2.0 秒。调小防断电丢失，调大可减少机械硬盘读写噪音。
  auto_save_interval: 2.0

  # 🚀 [输入防抖节流阀] 连续保存的静默等待时间 (秒)
  # 抵御 IDE 自动保存或高频 Ctrl+S 导致的 AI 翻译接口风暴。
  # 💡 建议：打字极快且连贯者设为 3.0；习惯边写边停顿思考者建议设为 5.0~8.0。
  typing_idle_threshold: 5.0

  # 嵌套双链解析深度：遇到 ![[文档嵌套]] 时，最多允许往下展开几层（防止死循环）。
  max_depth: 3

  # ==========================================
  # 🛡️ 资产审计与物理清算阀门 (Asset Audit & GC Valve)
  # ==========================================
  # 控制引擎是否在同步完成后执行逻辑-物理的双向交叉验证，以及冗余附件的物理删除。
  # 
  # 可选值：
  # true  (默认推荐): 开启严格的基线管控。
  #       - 正向审计：检查被文章引用的图片/附件是否在前端目录中真实存在，若丢失则触发警报。
  #       - 反向清算：扫描前端资产目录，将没有任何文章引用的“孤儿文件”进行不可逆的物理抹除。
  #       - 适用场景：追求前端产物绝对纯净、无冗余的完美主义架构。
  #
  # false : 强行阻断底层清理泵 (GC)。
  #       - 行为：引擎将只负责解析、翻译和写入，绝对不会扫描前端资产目录，也绝对不会删除任何文件。
  #       - 适用场景：
  #         1. 搭配了图床或 CDN，本地资产由第三方工具（如 PicGo）手动接管时，防止被引擎误删。
  #         2. 库内包含上万篇超大规模文档时，关闭此项可免除全盘 I/O 扫描，换取极致的同步吞吐率。
  enable_asset_audit: true
  
# ==========================================
# 📄 文档元数据策略 (Frontmatter Directives)
# ==========================================
# 引擎在解析 Markdown 时，会读取头部 YAML 区的特殊指令。
# 以下是引擎原生支持的高阶控制标签（在具体的 .md 文件中使用）：
#
# - draft: true         # [拦截墙] 强制拦截该文章，全语种下线，前端物理删除。
# - publish: false      # [拦截墙] 同 draft: true，语义等价。
# - ai_sync: false      # [算力锁] 静默微调模式。跳过 AI 翻译与 SEO，仅同步本地排版，用于极速修正错别字。

# ------------------------------------------
# 4. 全局属性兜底 (Frontmatter Defaults)
# ------------------------------------------
frontmatter_defaults:
  # 这里可以配置所有文章默认拥有的基础属性。
  # 对于忘记写 YAML 属性头的笔记，引擎会自动把这里的信息补充进去。
  # 若不想强制补充作者信息，可直接设为空字符串 ""。
  author: "Your Name"
  # 注意：不要把 ai_sync: false 写在这里，否则所有文章默认都不会触发翻译！

# ------------------------------------------
# 5. 文章属性排序规则 (SEO 排版美化)
# ------------------------------------------
# 决定了最终生成的 Markdown 文件头部 YAML 的字段排列顺序，让代码极其强迫症友好。
frontmatter_order:
  - title
  - description
  - keywords
  - author
  - date
  - tags
  - categories

# ------------------------------------------
# 6. 发布控制与隐私隔离
# ------------------------------------------
publish_control:
  exclude_patterns: 
    # 黑名单机制：在这里配置的文件或文件夹，引擎会彻底无视它们。
    # 既保护隐私，又防止把草稿发给 AI 浪费 API 费用 (支持通配符 *)。
    - "_drafts/*"      # 屏蔽整个草稿箱文件夹
    - "Private-*.md"   # 屏蔽以 Private- 开头的私密笔记
    - "草稿-*"

  # 开源版权尾缀声明
  # 设为 true: 会在每篇编译好的文章末尾自动加上下面这句版权词 (能有效增加网站 SEO 外链)。
  # 设为 false: 保持纯净输出。
  append_credit: true
  credit_text: "\n\n---\n*Powered by [Illacme-plenipes](https://github.com/Illacme/illacme-plenipes)*"
  
# ------------------------------------------
# 7. 图片压缩管线 (带宽拯救者)
# ------------------------------------------
image_settings:
  # 图像处理总开关。
  # 设为 true: 启动 WebP 深度压缩，自动修复手机照片的翻转问题，极大降低网站加载耗时。
  # 设为 false: 原封不动地直接拷贝图片（适用于极客追求纳秒级同步，且不在乎图床容量的场景）。
  enabled: true
  
  # 推荐保持 webp 格式，它是现代浏览器的性能标配。
  format: "webp"       
  
  # 限制最大宽度。遇到手机直出的 4K 巨图会自动等比缩小，防止撑爆网站带宽。
  max_width: 1400      
  
  # 压缩质量 (0-100)。80 是画质肉眼无损与体积缩小的完美平衡点。
  quality: 80          
  
  # 静态图片部署前缀。
  # 如果你的博客部署在域名子路径 (如 https://domain.com/blog/)，需严格修改为 "/blog/assets/"。
  base_url: "/assets/" 

# ------------------------------------------
# 8. AI 大模型驱动中枢 (核心引擎)
# ------------------------------------------
translation:
  # 兼容 openai 格式的任何 API (支持 OpenAI, Qwen, DeepSeek, Ollama, LM Studio 等)。
  # 若完全不需要翻译和 SEO 生成功能，可设为 "none"。
  provider: "openai"   
  
  # 大模型 API 接口地址。
  # 常见配置对照：
  # - LM Studio: "http://localhost:1234/v1"
  # - Ollama: "http://localhost:11434/v1"
  # - 商业云端 (如 DeepSeek): "https://api.deepseek.com/v1"
  base_url: "http://localhost:1234/v1"           
  
  # ⚠️ 致命警告：如果你要将本配置文件推送到 Github 公开仓库，严禁填入真实的扣费 Key！
  api_key: "sk-xxx..." 
  
  # 指定触发推理的模型名称
  model: "Qwen2.5-32B-Instruct"          

  # 🚀 [显存保护锁] AI 专属并发控制 (LLM Concurrency Semaphore)
  # 严格控制同一时刻对大模型发起的请求数量。
  # 💡 建议：若使用本地大模型，强烈建议锁定为 1，确保显存绝对安全；若使用云端商业 API，可调高至 5~10。
  llm_concurrency: 1
  
  # URL 生成模式: "ai" (由大模型翻译出漂亮的纯英文永久链接) 或 "local" (纯本地拼音/URL 编码)
  slug_mode: "ai"      
  
  # API 请求超时阈值 (秒)。
  # 💡 警告：本地模型处理长文翻译极慢，建议拉高至 600 以上以防管线被强制切断。
  api_timeout: 600     
  
  # 遇 429(限流) 或 500(服务端崩溃) 等错误时的自动重试次数。
  max_retries: 3       
  
  # 防空载保护（字数阈值）。
  # 当笔记正文少于此字数时，直接判定为“空文件”，主动不发给大模型，防范 AI 胡言乱语。
  empty_content_threshold: 15
  
  # AI 推理温度 (0.0 ~ 2.0)
  # 翻译任务必须严谨，推荐 0.1；若你想让 AI 自由发挥、二次创作，可调高至 0.6 ~ 0.8。
  temperature: 0.1
  
  # 🚀 [安全切片引擎] 长文 Token 拆分阈值
  # 当单篇文章超长时，引擎会自动将其拆成多块发给 AI，防止超出模型上下文导致报错。
  # 1 Token 约等于 1.5 个汉字。
  # 💡 建议：本地小模型或 Mac 显存有限时，建议设为 2000~2500 防爆显存；使用顶级 API 时可拉高至 8000。
  max_chunk_size: 2500
  
  # 🚀 自定义 AI 人设中枢 (Prompt 定制)
  custom_prompts:
    # 翻译系统指令。默认设定为严谨的"专业技术译者"。
    # 若你的笔记偏生活随笔，可改为："你是一个幽默的博客翻译官，请用轻松的语气翻译。"
    # 大模型安全防御里的一个高级技巧，制造“跨语种隔离隔离墙” (Linguistic Boundary)，所以强烈建议用英文下达最高系统指令，用中文提供正文。
    # 人设示例："你是一位精通中美互联网文化的资深双语技术专家。请将用户提供的源文本翻译为极具地道英语母语者阅读习惯的文章。要求：1. 译文必须极其流畅自然，严禁生硬的机器翻译腔调；2. 完美保留所有 Markdown 排版格式；3. 精准转换技术专有名词。"
    translate_system: "You are a professional technical translator. Your translation should be fluent, accurate, and perfectly retain the technical terminology."
    # SEO 提取指令。决定了生成的摘要和关键词的转化率导向。
    # 人设示例："你是一位拥有 10 年经验的顶级 SEO 流量优化专家。你需要精准洞察文章的核心价值，并提取出最容易被 Google 搜索引擎抓取的优质摘要与核心流量词汇。严格遵守 JSON 格式输出。"
    seo_system: "You are a senior SEO expert. Extract precise descriptions and highly targeted keywords to maximize search engine visibility."

# ------------------------------------------
# 9. AI 自动化 SEO 提取管线
# ------------------------------------------
seo_settings:
  # SEO 核心总闸。
  # 设为 true: 引擎会针对每篇新文章，让 AI 自动阅读前 1500 字，精准提取摘要和关键词。
  # 💡 建议：私人内部知识库建议设为 false 以追求极致速度；对外公开的博客务必设为 true 以白嫖搜索引擎流量。
  enabled: true
  
  # 以下开关在 enabled: true 时生效
  generate_description: true  # 自动生成 150 字精炼摘要，填入 YAML 的 description 中
  generate_keywords: true     # 自动提取逗号分隔的纯净关键词，填入 keywords 中

# ------------------------------------------
# 10. 多语言矩阵 (多线程并发翻译阵列)
# ------------------------------------------
i18n_settings:
  # 多语言管线总开关。
  # 设为 false 时，引擎将只做极速的格式转换与文件拷贝，彻底跳过多语言翻译逻辑。
  enabled: true
  
  source:
    code: "zh-cn"             # 源语言对应的路由目录 (文章最终会存入 /zh-cn/...)
    translate_body: false     # 中文原稿免翻译直接输出，零 API 消耗
  targets:
    - code: "en"              # 目标语言路由目录 (最终存入 /en/...)
      prompt_lang: "English"  # 告诉 AI 目标语言是什么（会注入到底层提示词中）
      translate_body: true    # 开启后，将调用 AI 将全文翻译成英文