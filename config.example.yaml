# ==========================================
# Illacme-plenipes (v34.0 旗舰版 - 工业级全量配置) 
# ==========================================
# 欢迎使用本项目！这是一个专为海量 Markdown 构筑的工业级分发与 AI 翻译引擎。
# 本文件已根据 V32.4 核心代码库及历史稳健版本执行了全量复归，包含所有核心与隐藏节点。
#
# 💡 提示：
#   1. 您可以仅配置感兴趣的部分，未定义的项将自动继承系统默认值 (core/config.py)。
#   2. 本地调试建议创建 "config.local.yaml"，它会原子级覆盖本文件中的同名配置。
# ==========================================

# ------------------------------------------
# 1. 核心物理基础设施 (Core Infrastructure)
# ------------------------------------------

# [核心基座]：存放您原始 Obsidian/Logseq/Markdown 文件的位置
vault_root: "./vault"

# [状态机账本]：存储文章指纹、翻译进度、Slug 与 SEO 缓存的 JSON 数据库
metadata_db: ".plenipes/ledger.json"

# [路由总闸]：当前激活的主题 Key。引擎将根据此键从 theme_options 中提取特定适配逻辑。
# 支持: "docusaurus", "starlight", "vitepress", "nextra", "hugo", "hexo"
active_theme: "docusaurus"

# 官网主域名：用于生成完整的 Canonical URL 或分发时的绝对链接
site_url: "https://your-garden.com"

# ------------------------------------------
# 2. 全局物理出站映射 (Output Paths)
# ------------------------------------------
# 💡 建议直接在 theme_options 中为每个主题单独配置路径，此处仅作为未声明主题的安全回退。
output_paths:
  markdown_dir: "./themes/{theme}/src/content/docs"
  assets_dir: "./themes/{theme}/public/assets"
  graph_json_dir: "./themes/{theme}/public"

# 🚀 动态路由矩阵：将本地笔记的不同子文件夹，灵活映射到前端的不同路由槽位。
route_matrix:
  - source: "Index"      # 对应根目录下的 Index 文件夹 (映射首页)
    prefix: ""           
  - source: "Blog"       # 博客文件夹 -> /blog/*
    prefix: "blog"       
  - source: "Docs"       # 文档文件夹 -> /docs/*
    prefix: "docs"       

# ==========================================
# 3. 入站方言适配 (Ingress Dialect Engine)
# ==========================================
ingress_settings:
  # 方言处理器：auto 会自动激活 Obsidian/Logseq/Notion/Typora/MkDocs 等所有处理逻辑
  # 您也可以指定列表，如 ["obsidian", "logseq"]
  active_dialects: ["auto"]
  
  # 静态化组件：将特定的动态语法 (如 Tabs/Dataview) 转化为 SSG 兼容的静态 HTML/React 组件
  staticize_components: true
  
  # 硬换行控制：是否将单换行符物理映射为 Markdown 硬换行（空格+回车）
  hard_line_break: false
  
  # [声明式输入清洗器] 允许利用正则将任何未知的非标语法在进入核心管线前强制抹平
  custom_sanitizers:
    # 示例：将 Typora 的高亮语法 ==高亮== 转化为 HTML <mark> 标签
    # highlight_fix:
    #   pattern: "==([^=]+)=="
    #   replace: "<mark>\\1</mark>"

# ==========================================
# 4. 声明式主题配置集 (Theme Options Matrix)
# ==========================================
# 💡 【高阶换肤指南】：
# 引擎如何把 Obsidian 的特有语法 (如 Callouts) 转化为目标主题的代码？就看这里。
theme_options:
  docusaurus:
    syntax_engine: "docusaurus"
    syntax_preset: "admonitions"
    output_paths:
      markdown_dir: "./themes/{theme}/docs"
      assets_dir: "./themes/{theme}/static/assets"
      graph_json_dir: "./themes/{theme}/static"
    lang_mapping: { "zh": "zh-Hans", "en": "en" }
    metadata_mapping:
      last_modified: { key: "last_update", style: "object" }
      author: { key: "author" }

  starlight:
    syntax_engine: "starlight"
    syntax_preset: "admonitions"
    output_paths:
      markdown_dir: "./themes/{theme}/src/content/docs"
      assets_dir: "./themes/{theme}/public/assets"
      graph_json_dir: "./themes/{theme}/public"
    lang_mapping: { "zh": "zh-cn", "en": "en" }

  vitepress:
    syntax_engine: "vitepress"
    output_paths:
      markdown_dir: "./themes/{theme}/docs"
      assets_dir: "./themes/{theme}/public/assets"
      graph_json_dir: "./themes/{theme}/public"

  nextra:
    syntax_engine: "nextra"
    output_paths:
      markdown_dir: "./themes/{theme}/pages"
      assets_dir: "./themes/{theme}/public/assets"

  hugo:
    syntax_engine: "hugo"
    output_paths:
      markdown_dir: "./themes/{theme}/content"
      assets_dir: "./themes/{theme}/static/assets"

  hexo:
    syntax_engine: "hexo"
    output_paths:
      markdown_dir: "./themes/{theme}/source/_posts"
      assets_dir: "./themes/{theme}/source/assets"

# ==========================================
# 5. 声明式 SSG 渲染适配器 (Framework Adapters)
# ==========================================
# 🚀 彻底解除 Python 底层代码的硬编码绑定！
# 引擎通过此处的字典，将 Obsidian 的特有语法物理降维到各框架支持的 UI 组件。
framework_adapters:
  starlight:
    callout_template: "\n:::{type} {title}\n{body}\n:::\n\n"
    type_mapping:
      info: "note"
      abstract: "note"
      success: "tip"
      warning: "caution"
      danger: "danger"

  vitepress:
    callout_template: "\n:::{type} {title}\n{body}\n:::\n\n"
    type_mapping:
      note: "info"
      tip: "tip"
      warning: "warning"
      danger: "danger"

  docusaurus:
    callout_template: "\n:::{type} {title}\n{body}\n:::\n\n"
    type_mapping:
      note: "note"
      info: "info"
      success: "tip"
      warning: "warning"
      danger: "danger"
    component_mappings:
      "CardGrid": "{children}"
      "Card": "### {title}\n\n{children}\n\n"

  nextra:
    callout_template: "\n<Callout type=\"{type}\">\n**{title}**\n{body}\n</Callout>\n\n"
    type_mapping:
      note: "default"
      info: "info"
      warning: "warning"
      danger: "error"

  hugo:
    # ⚠️ 架构防线：使用 {{{{ 和 }}}} 防止 Python 模板引擎发生解析越界撕裂
    callout_template: "\n{{{{< admonition type=\"{type}\" title=\"{title}\" >}}}}\n{body}\n{{{{< /admonition >}}}}\n\n"
    type_mapping:
      note: "note"
      tip: "tip"
      warning: "warning"

  hexo:
    callout_template: "\n{{{{% note {type} %}}}}\n**{title}**\n{body}\n{{{{% endnote %}}}}\n\n"
    type_mapping:
      note: "default"
      info: "info"
      warning: "warning"

# ==========================================
# 6. AI 算力网关 (Translation & Intelligence Hub)
# ==========================================
translation:
  # 🎯 算力调度策略: "single", "fallback" (主备切分), "smart_routing" (长短分流)
  strategy: "fallback"
  
  primary_node: "lmstudio_local"  
  fallback_node: "deepseek_api"   
  routing_threshold: 1000        

  # 🎯 物理算力控制阀 (Safety Valves)
  llm_concurrency: 1             # [全局推理信号量] 保护 AI 集群免遭 HTTP 风暴击穿
  api_timeout: 600.0             # 本地模型处理长文翻译极慢，建议拉高
  max_retries: 3                 # 遭遇网络抖动时的指数退避重试次数
  temperature: 0.2               # 翻译建议 0.1-0.2 保持严谨
  max_tokens: 8192               # 单次 AI 响应最大 Token 上限
  
  # 🎯 物理内容保护规则
  max_chunk_size: 2500           # 基于 tiktoken 算法对文档段落进行无损切割的最大阈值
  empty_content_threshold: 15    # 忽略内容过少的残片
  max_slug_length: 100           # 彻底解决路径过长的物理截断
  max_seo_description_length: 200 # SEO 描述最大字数
  
  # 🎯 永久链接模式 (Slug Mode): "ai" (语义翻译) 或 "local" (本地正则)
  slug_mode: "ai"

  # 🎯 算力节点登记 (Providers)
  providers:
    deepseek_api:
      type: "openai-compatible"
      base_url: "https://api.deepseek.com/v1"
      # ⚠️ 注意：推荐设置环境变量 ILLACME_API_KEY 以保护密钥。
      api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"
      model: "deepseek-chat"
      
    gemini_node:
      type: "gemini"
      api_key: "AIza-xxxxxxxxxxxxxxxxxxxxxxxx"
      model: "gemini-1.5-flash"

    lmstudio_local:
      type: "openai-compatible"
      base_url: "http://localhost:1234/v1"
      api_key: "your-api-key-here"
      model: "qwen/qwen3.5-9b"

# ==========================================
# 7. 多语言与 SEO 矩阵 (i18n & SEO Matrix)
# ==========================================
i18n_settings:
  enabled: true
  source:
    lang_code: "zh"               # 源语言代码 (Docusaurus 为 zh-Hans)
    name: "简体中文"               
  targets:
    - lang_code: "en"            
      name: "English"
      translate_body: true        
      translate_title: true       

seo_settings:
  enabled: true                  
  generate_description: true      
  generate_keywords: true         

# ==========================================
# 8. 全域资产处理 (Asset & Image Pipeline)
# ==========================================
image_settings:
  enabled: true                   
  process_images: true            
  format: "webp"                  
  quality: 80                     
  max_width: 1400                 
  generate_alt: true              
  deduplication: true             # [CAS]：基于文件内容指纹去重，彻底消灭全站图片冗余
  base_url: "/assets/"            

# ==========================================
# 9. 内容分发矩阵 (Syndication Matrix)
# ==========================================
syndication:
  enabled: false                  
  timeout: 15.0                   
  devto: { enabled: false, api_key: "" }
  medium: { enabled: false, token: "", author_id: "" }
  wordpress: { enabled: false, url: "", username: "", app_password: "" }
  ghost: { enabled: false, url: "", admin_api_key: "" }
  universal_webhook: { enabled: false, url: "", auth_token: "" }

# ==========================================
# 10. 系统级专家调优 (System & Performance)
# ==========================================
system:
  max_workers: 8                  # [I/O 吞吐极值] 影响扫描、图片压缩与自愈速度
  log_level: "INFO"               
  verbose_ai_logs: true           
  singleton_port: 43210           # [OS 级防线] 防多开安全端口，免疫僵尸进程
  auto_save_interval: 2.0         
  max_depth: 3                    # [AST 递归护城河] 遇到 ![[嵌套]] 的最大解析深度
  enable_asset_audit: true        # [自净基线总闸] 开启后自动肃清幽灵空目录及野路由
  
  # AI 上下文提纯：在发送给 AI 前，物理移除干扰项以节省 Token
  ai_context_purification:
    strip_styles: true
    strip_mdx_imports: true
    strip_comments: true
    strip_code_blocks: false      

  # ⚖️ [V14.3 物理防护矩阵] Janitor 排除逻辑
  janitor_settings:
    global_exclude: [".git", "node_modules", "dist", ".docusaurus"]
    theme_exclude:
      docusaurus: [".docusaurus", "build"]
      starlight: [".astro", "node_modules"]

  # 🌐 全局网络探针控制
  network_settings:
    ignored_domains:
      - "img.shields.io"
      - "github-readme-stats.vercel.app"
      - "wakatime.com"

# ==========================================
# 11. 发布权限与隐私隔离 (Publish Control)
# ==========================================
publish_control:
  exclude_patterns: ["_drafts/*", ".hidden/*"] 
  webhook_enabled: false          
  webhook_urls: []                
  append_credit: false            
  credit_text: "\n\n---\n*Powered by [Illacme-plenipes](https://github.com/Illacme/illacme-plenipes)*"

# ==========================================
# 12. 高阶元数据约束 (Metadata Matrix)
# ==========================================
# [SEO 排版美化]：决定最终生成的 Markdown 头部 YAML 的字段排列顺序
frontmatter_order: ["title", "description", "keywords", "author", "date", "tags", "categories"]
# [默认属性注入]：为缺失 YAML 属性的文章自动补充基础信息
frontmatter_defaults:
  author: "Your Name"                  

# ------------------------------------------
# 🌏 全局语种代码映射 (Legacy Fix)
# ------------------------------------------
lang_mapping: { "zh": "zh-Hans" }

# ==========================================
# 13. 创作审计时间轴 (Industrial Audit Timeline)
# ==========================================
timeline:
  # 审计总开关
  # 设为 true: 引擎会实时记录每一次本地保存、移动与删除行为，并生成历史溯源报表。
  enabled: true
  
  # 原始数据账本路径 (JSON 格式，供程序读取)
  json_path: ".plenipes/plenipes_timeline.json"
  
  # 用户友好的可视化报告路径 (Markdown 格式)
  markdown_path: ".plenipes/timeline.md"
  
  # 最大保留记录条数 (防止日志无限膨胀)
  max_entries: 1000
